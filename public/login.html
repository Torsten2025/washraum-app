<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GBMZ Maneggplatz 18</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page">
    <header class="app-header login-header">
      <a class="brand" href="/login.html" aria-label="GBMZ Maneggplatz 18">GBMZ</a>
      <span class="site-address">Maneggplatz 18</span>
    </header>

    <main class="login-shell">
      <h1>Maneggplatz 18</h1>
      <form id="loginForm" class="login-form">
        <label>
          Name
          <input id="userName" name="userName" autocomplete="name" required>
        </label>

        <label>
          Passwort
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>

        <button type="submit">Einloggen</button>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
