<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GBMZ Maneggplatz 18</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page">
    <header class="app-header login-header">
      <a class="brand" href="/login.html" aria-label="GBMZ Maneggplatz 18">GBMZ</a>
      <span class="site-address">Maneggplatz 18</span>
    </header>

    <main class="login-shell">
      <h1>Maneggplatz 18</h1>
      <div class="auth-switch" role="tablist" aria-label="Anmeldung">
        <button id="showLoginButton" class="auth-switch-button is-active" type="button">Einloggen</button>
        <button id="showRegisterButton" class="auth-switch-button" type="button">Account erstellen</button>
      </div>
      <form id="loginForm" class="login-form">
        <label>
          Name
          <input id="userName" name="userName" autocomplete="name" required>
        </label>

        <label>
          Passwort
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>

        <button type="submit">Einloggen</button>
        <p id="loginMessage" class="message" role="status"></p>
      </form>

      <form id="registerForm" class="login-form hidden">
        <label>
          Name fuer Login
          <input id="registerUserName" name="registerUserName" autocomplete="username" required>
        </label>

        <label>
          Anzeigename
          <input id="registerDisplayName" name="registerDisplayName" autocomplete="name" maxlength="80" placeholder="z. B. Familie Mueller">
        </label>

        <label>
          Partei / Wohnung
          <input id="registerApartmentLabel" name="registerApartmentLabel" maxlength="40" placeholder="z. B. Partei 12">
        </label>

        <label>
          Passwort
          <input id="registerPassword" name="registerPassword" type="password" autocomplete="new-password" required>
        </label>

        <button type="submit">Account erstellen</button>
        <p id="registerMessage" class="message" role="status"></p>
      </form>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
