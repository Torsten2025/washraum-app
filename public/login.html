<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waschraum Login</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page">
    <header class="app-header login-header">
      <a class="brand" href="/login.html" aria-label="GBMZ Waschraum">GBMZ</a>
      <nav class="main-nav" aria-label="Hauptnavigation">
        <a href="/login.html">UEBER UNS</a>
        <a href="/login.html">PROJEKTE</a>
        <a href="/login.html">SIEDLUNGEN</a>
      </nav>
      <span class="session-pill">myGBMZ</span>
    </header>

    <a class="notice-bar" href="#loginForm">Waschraum Buchungsportal</a>

    <main class="login-shell">
      <h1>Waschraum</h1>
      <form id="loginForm" class="login-form">
        <label>
          Name
          <input id="userName" name="userName" autocomplete="name" required>
        </label>

        <label>
          Passwort
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>

        <button type="submit">Einloggen</button>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
