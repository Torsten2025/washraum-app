<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waschraum Buchungen</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Waschraum</h1>
        <p id="sessionLabel"></p>
      </div>
      <button id="logoutButton" type="button">Abmelden</button>
    </header>

    <main class="app-layout">
      <section class="booking-panel">
        <h2>Buchung eintragen</h2>
        <form id="bookingForm" class="booking-form">
          <label>
            Bereich
            <select id="resourceType" name="resourceType">
              <option value="washer">Waschmaschine</option>
              <option value="drying_room">Trockenraum</option>
            </select>
          </label>

          <label>
            Maschine / Raum
            <select id="resourceId" name="resourceId"></select>
          </label>

          <label id="adminTargetGroup" class="hidden">
            Buchen fuer
            <input id="adminTargetUserName" name="adminTargetUserName" autocomplete="name">
          </label>

          <label>
            Start
            <input id="startAt" name="startAt" type="datetime-local" required>
          </label>

          <label>
            Ende
            <input id="endAt" name="endAt" type="datetime-local" required>
          </label>

          <button type="submit">Buchen</button>
          <p id="formMessage" class="message" role="status"></p>
        </form>

        <div class="account-panel">
          <h2>Passwort aendern</h2>
          <form id="passwordForm" class="booking-form">
            <label>
              Aktuelles Passwort
              <input id="currentPassword" name="currentPassword" type="password" autocomplete="current-password" required>
            </label>

            <label>
              Neues Passwort
              <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required>
            </label>

            <button type="submit">Passwort speichern</button>
            <p id="passwordMessage" class="message" role="status"></p>
          </form>
        </div>

        <div id="adminUsersPanel" class="admin-panel hidden">
          <h2>Nutzer verwalten</h2>
          <form id="userForm" class="booking-form">
            <input id="editingUserId" type="hidden">
            <label>
              Name
              <input id="managedUserName" name="managedUserName" autocomplete="name" required>
            </label>

            <label>
              Rolle
              <select id="managedUserRole" name="managedUserRole">
                <option value="user">Nutzer</option>
                <option value="admin">Admin</option>
              </select>
            </label>

            <label>
              Passwort
              <input id="managedUserPassword" name="managedUserPassword" type="password" autocomplete="new-password">
            </label>

            <div class="form-actions">
              <button id="saveUserButton" type="submit">Nutzer speichern</button>
              <button id="cancelUserEditButton" type="button">Abbrechen</button>
            </div>
            <p id="userMessage" class="message" role="status"></p>
          </form>
          <div id="usersList" class="users-list"></div>
        </div>
      </section>

      <section class="calendar-panel">
        <div class="calendar-toolbar">
          <div>
            <h2>Buchungen</h2>
            <p id="weekLabel" class="week-label"></p>
          </div>
          <div class="calendar-actions">
            <button id="previousWeekButton" type="button">Zurueck</button>
            <button id="todayButton" type="button">Heute</button>
            <button id="nextWeekButton" type="button">Vor</button>
            <select id="bookingFilter">
              <option value="all">Alle anzeigen</option>
              <option value="washer">Waschmaschinen</option>
              <option value="drying_room">Trockenraeume</option>
            </select>
          </div>
        </div>
        <div id="bookingsList" class="bookings-list"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
