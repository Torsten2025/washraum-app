services:
  - type: web
    name: washraum-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_PATH
        value: /var/data/washraum.sqlite
    disk:
      name: washraum-data
      mountPath: /var/data
      sizeGB: 1
