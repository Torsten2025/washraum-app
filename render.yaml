services:
  - type: web
    name: washraum-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_PATH
        value: /var/data/washraum.sqlite
      - key: SEED_ADMIN_NAME
        value: admin
      - key: SEED_ADMIN_PASSWORD
        value: change-me-before-production
      - key: SEED_USER_NAME
        value: user
      - key: SEED_USER_PASSWORD
        value: change-me-before-production
    disk:
      name: washraum-data
      mountPath: /var/data
      sizeGB: 1
