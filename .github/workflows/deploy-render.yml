name: Verify and deploy to Render

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run check

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::GitHub secret RENDER_DEPLOY_HOOK_URL is missing."
            exit 1
          fi

          separator='?'
          case "$RENDER_DEPLOY_HOOK_URL" in
            *\?*) separator='&' ;;
          esac

          curl --fail --silent --show-error \
            --request POST \
            --retry 3 \
            --retry-all-errors \
            "${RENDER_DEPLOY_HOOK_URL}${separator}ref=${GITHUB_SHA}"

      - name: Verify deployed commit
        env:
          APP_URL: https://washraum-app.onrender.com
        run: |
          for attempt in $(seq 1 36); do
            health="$(curl --fail --silent --show-error "$APP_URL/api/health" || true)"
            if printf '%s' "$health" | grep --fixed-strings --quiet "$GITHUB_SHA"; then
              echo "Render is live on $GITHUB_SHA"
              exit 0
            fi
            echo "Waiting for Render deploy ($attempt/36)..."
            sleep 10
          done

          echo "::error::Render did not report commit $GITHUB_SHA as live."
          exit 1
