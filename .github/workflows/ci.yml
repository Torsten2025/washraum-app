name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run static and hosting checks
        run: npm run verify

      - name: Start local app
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/health; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Run smoke test
        run: npm run smoke

      - name: Show server logs on failure
        if: failure()
        run: cat server.log || true
